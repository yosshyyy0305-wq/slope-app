<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>勾配計算アプリ</title>
  <style>
    :root{
      --bg:#eef5ff;
      --card:#ffffff;
      --text:#16324f;
      --muted:#5b728d;
      --line:#d7e4f4;
      --blue:#1f6fd6;
      --blue-dark:#185bb0;
      --blue-soft:#dbeafe;
      --shadow:0 8px 24px rgba(22,50,79,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
    body{padding-bottom:24px}

    .app{max-width:960px;margin:0 auto;padding:14px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}

    h1{margin:0;font-size:22px}

    .field{margin-bottom:12px}
    .field:last-child{margin-bottom:0}
    label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}

    .icon-label{display:inline-flex;align-items:center;gap:6px}
    .icon-tab{margin-right:6px}
    .icon-box{margin-right:6px}

    input[type="number"]{
      width:100%;
      min-height:48px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:16px;
      color:var(--text);
      background:#fff;
      outline:none;
      appearance:none;
    }
    input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(31,111,214,.12)}

    .btn{
      min-height:44px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px 12px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      line-height:1.2;
    }
    .btn.active{background:var(--blue-soft);border-color:#9dc3f8;color:var(--blue-dark)}

    .tab-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .tab-row .btn{width:100%;white-space:nowrap;letter-spacing:-0.02em}

    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    .unit-input{position:relative}
    .unit-input input{padding-right:74px}
    .unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:800;color:var(--muted);pointer-events:none}

    .input-mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .input-mode-row .btn{min-height:40px;font-size:14px;padding:8px 10px}

    .quick-inline{margin-top:12px}
    .quick-grid-top{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
    .quick-grid-bottom{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:8px}
    .quick-grid-top .btn,.quick-grid-bottom .btn{font-size:13px;padding:10px 8px;min-height:42px;white-space:nowrap}

    .summary-layout{display:grid;grid-template-columns:1fr;gap:10px}
    .summary-box{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:12px}
    .summary-box .k{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:6px}
    .summary-box .v{font-size:24px;font-weight:900;line-height:1.2;word-break:break-word}
    .summary-box .s{font-size:13px;font-weight:800;color:var(--muted);margin-top:4px;min-height:18px}

    .diagram-card{border:1px solid var(--line);border-radius:14px;background:#f8fbff;padding:10px;margin-bottom:12px}
    .diagram-title{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px}
    .mini-diagram{position:relative}
    .mini-diagram svg{display:block;width:100%;height:180px}
    .diagram-note{position:absolute;left:8px;top:8px;font-size:11px;font-weight:800;color:var(--muted);background:rgba(255,255,255,.9);padding:3px 7px;border-radius:999px;border:1px solid var(--line)}

    .hidden{display:none!important}

    @media (max-width:700px){
      .tab-row{gap:6px}
      .tab-row .btn{font-size:13px;padding:10px 6px}
      .grid-2{grid-template-columns:1fr}
      .quick-grid-top{grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
      .quick-grid-bottom{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:6px}
      .quick-grid-top .btn,.quick-grid-bottom .btn{font-size:12px;padding:9px 6px}
      .mini-diagram svg{height:160px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>∠ 勾配計算アプリ</h1>
    </div>

    <div class="panel">
      <div class="tab-row">
        <button id="modeSlope" class="btn active" type="button"><span class="icon-tab">∠</span>勾配を出す</button>
        <button id="modeRun" class="btn" type="button"><span class="icon-tab">⇄</span>水平距離</button>
        <button id="modeRise" class="btn" type="button"><span class="icon-tab">⇅</span>高低差</button>
      </div>
      <div style="margin-top:10px;">
        <button id="resetBtn" class="btn" type="button" style="width:100%;">リセット</button>
      </div>
    </div>

    <div id="panel-slope" class="panel">
      <div class="diagram-card">
        <div class="diagram-title">図</div>
        <div class="mini-diagram">
          <div class="diagram-note">直角三角形イメージ</div>
          <svg viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <line x1="55" y1="130" x2="275" y2="130" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" />
            <line x1="275" y1="130" x2="275" y2="38" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" />
            <line x1="55" y1="130" x2="275" y2="38" stroke="#8fb8ef" stroke-width="5" stroke-linecap="round" />
            <rect x="249" y="104" width="26" height="26" fill="none" stroke="#8fb8ef" stroke-width="4" rx="3" />
            <text x="165" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">⇄ 水平距離</text>
            <text x="308" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">⇅ 高低差</text>
            <text x="156" y="54" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">∠ 勾配</text>
          </svg>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="slopeRun"><span class="icon-label">⇄ <span>水平距離</span></span></label>
          <div class="unit-input">
            <input id="slopeRun" type="number" value="" inputmode="decimal" />
            <span class="unit">mm</span>
          </div>
        </div>
        <div class="field">
          <label for="slopeRise"><span class="icon-label">⇅ <span>高低差</span></span></label>
          <div class="unit-input">
            <input id="slopeRise" type="number" value="" inputmode="decimal" />
            <span class="unit">mm</span>
          </div>
        </div>
      </div>
    </div>

    <div id="panel-run" class="panel hidden">
      <div class="diagram-card">
        <div class="diagram-title">図</div>
        <div class="mini-diagram">
          <div class="diagram-note">水平距離を計算</div>
          <svg viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <line x1="55" y1="130" x2="275" y2="130" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10" />
            <line x1="275" y1="130" x2="275" y2="38" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" />
            <line x1="55" y1="130" x2="275" y2="38" stroke="#8fb8ef" stroke-width="5" stroke-linecap="round" />
            <rect x="249" y="104" width="26" height="26" fill="none" stroke="#8fb8ef" stroke-width="4" rx="3" />
            <text x="165" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6fd6">⇄ 求める</text>
            <text x="308" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">⇅ 高低差</text>
            <text x="156" y="54" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">∠ 勾配</text>
          </svg>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label><span class="icon-label">∠ <span>勾配</span></span></label>
          <div class="input-mode-row">
            <button id="runInputModePercent" class="btn active" type="button">%</button>
            <button id="runInputModeFraction" class="btn" type="button">1/x</button>
          </div>
          <div id="runPercentWrap" class="unit-input">
            <input id="runPercent" type="number" value="" step="any" inputmode="decimal" />
            <span class="unit">%</span>
          </div>
          <div id="runFractionWrap" class="unit-input hidden">
            <input id="runFraction" type="number" value="" step="any" inputmode="decimal" />
            <span class="unit">1/x</span>
          </div>
        </div>
        <div class="field">
          <label for="runRise"><span class="icon-label">⇅ <span>高低差</span></span></label>
          <div class="unit-input">
            <input id="runRise" type="number" value="" inputmode="decimal" />
            <span class="unit">mm</span>
          </div>
        </div>
      </div>
      <div class="quick-inline">
        <div class="quick-grid-top">
          <button class="btn quick-btn" data-percent="1" type="button">1%</button>
          <button class="btn quick-btn" data-percent="1.5" type="button">1.5%</button>
          <button class="btn quick-btn" data-percent="2" type="button">2%</button>
          <button class="btn quick-btn" data-percent="3" type="button">3%</button>
        </div>
        <div class="quick-grid-bottom">
          <button class="btn quick-btn" data-percent="12.5" type="button">1/8（建基法）</button>
          <button class="btn quick-btn" data-percent="8.3333333333" type="button">1/12（バリア法）</button>
        </div>
      </div>
    </div>

    <div id="panel-rise" class="panel hidden">
      <div class="diagram-card">
        <div class="diagram-title">図</div>
        <div class="mini-diagram">
          <div class="diagram-note">高低差を計算</div>
          <svg viewBox="0 0 360 180" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <line x1="55" y1="130" x2="275" y2="130" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" />
            <line x1="275" y1="130" x2="275" y2="38" stroke="#1f6fd6" stroke-width="6" stroke-linecap="round" stroke-dasharray="12 10" />
            <line x1="55" y1="130" x2="275" y2="38" stroke="#8fb8ef" stroke-width="5" stroke-linecap="round" />
            <rect x="249" y="104" width="26" height="26" fill="none" stroke="#8fb8ef" stroke-width="4" rx="3" />
            <text x="165" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">⇄ 水平距離</text>
            <text x="308" y="86" text-anchor="middle" font-size="15" font-weight="700" fill="#1f6fd6">⇅ 求める</text>
            <text x="156" y="54" text-anchor="middle" font-size="15" font-weight="700" fill="#5b728d">∠ 勾配</text>
          </svg>
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label><span class="icon-label">∠ <span>勾配</span></span></label>
          <div class="input-mode-row">
            <button id="riseInputModePercent" class="btn active" type="button">%</button>
            <button id="riseInputModeFraction" class="btn" type="button">1/x</button>
          </div>
          <div id="risePercentWrap" class="unit-input">
            <input id="risePercent" type="number" value="" step="any" inputmode="decimal" />
            <span class="unit">%</span>
          </div>
          <div id="riseFractionWrap" class="unit-input hidden">
            <input id="riseFraction" type="number" value="" step="any" inputmode="decimal" />
            <span class="unit">1/x</span>
          </div>
        </div>
        <div class="field">
          <label for="riseRun"><span class="icon-label">⇄ <span>水平距離</span></span></label>
          <div class="unit-input">
            <input id="riseRun" type="number" value="" inputmode="decimal" />
            <span class="unit">mm</span>
          </div>
        </div>
      </div>
      <div class="quick-inline">
        <div class="quick-grid-top">
          <button class="btn quick-btn" data-percent="1" type="button">1%</button>
          <button class="btn quick-btn" data-percent="1.5" type="button">1.5%</button>
          <button class="btn quick-btn" data-percent="2" type="button">2%</button>
          <button class="btn quick-btn" data-percent="3" type="button">3%</button>
        </div>
        <div class="quick-grid-bottom">
          <button class="btn quick-btn" data-percent="12.5" type="button">1/8（建基法）</button>
          <button class="btn quick-btn" data-percent="8.3333333333" type="button">1/12（バリア法）</button>
        </div>
      </div>
    </div>

    <div class="panel">
      <div id="result-slope" class="summary-layout">
        <div class="summary-box">
          <div class="k"><span class="icon-box">∠</span>勾配</div>
          <div class="v" id="resultPercent">-- %</div>
          <div class="s" id="resultFraction">--</div>
        </div>
      </div>

      <div id="result-run" class="summary-layout hidden">
        <div class="summary-box">
          <div class="k"><span class="icon-box">⇄</span>水平距離</div>
          <div class="v" id="resultRun">-- mm</div>
        </div>
      </div>

      <div id="result-rise" class="summary-layout hidden">
        <div class="summary-box">
          <div class="k"><span class="icon-box">⇅</span>高低差</div>
          <div class="v" id="resultRise">-- mm</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      mode: 'slope',
      runInputMode: 'percent',
      riseInputMode: 'percent'
    };

    const els = {
      modeSlope: document.getElementById('modeSlope'),
      modeRun: document.getElementById('modeRun'),
      modeRise: document.getElementById('modeRise'),
      panelSlope: document.getElementById('panel-slope'),
      panelRun: document.getElementById('panel-run'),
      panelRise: document.getElementById('panel-rise'),
      slopeRun: document.getElementById('slopeRun'),
      slopeRise: document.getElementById('slopeRise'),
      runPercent: document.getElementById('runPercent'),
      runFraction: document.getElementById('runFraction'),
      runRise: document.getElementById('runRise'),
      risePercent: document.getElementById('risePercent'),
      riseFraction: document.getElementById('riseFraction'),
      riseRun: document.getElementById('riseRun'),
      runInputModePercent: document.getElementById('runInputModePercent'),
      runInputModeFraction: document.getElementById('runInputModeFraction'),
      riseInputModePercent: document.getElementById('riseInputModePercent'),
      riseInputModeFraction: document.getElementById('riseInputModeFraction'),
      runPercentWrap: document.getElementById('runPercentWrap'),
      runFractionWrap: document.getElementById('runFractionWrap'),
      risePercentWrap: document.getElementById('risePercentWrap'),
      riseFractionWrap: document.getElementById('riseFractionWrap'),
      resultSlope: document.getElementById('result-slope'),
      resultRunWrap: document.getElementById('result-run'),
      resultRiseWrap: document.getElementById('result-rise'),
      resultPercent: document.getElementById('resultPercent'),
      resultFraction: document.getElementById('resultFraction'),
      resultRun: document.getElementById('resultRun'),
      resultRise: document.getElementById('resultRise'),
      quickButtons: Array.from(document.querySelectorAll('.quick-btn')),
      resetBtn: document.getElementById('resetBtn')
    };

    function num(v){
      if (v === '' || v == null) return NaN;
      const n = parseFloat(v);
      return Number.isFinite(n) ? n : NaN;
    }

    function roundSmart(v){
      if (!Number.isFinite(v)) return '--';
      if (Math.abs(v - Math.round(v)) < 0.000001) return String(Math.round(v));
      if (Math.abs(v) >= 100) return v.toFixed(1).replace(/\.0$/, '');
      return v.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
    }

    function formatMm(v){
      return Number.isFinite(v) ? `${roundSmart(v)} mm` : '-- mm';
    }

    function formatPercent(v){
      return Number.isFinite(v) ? `${roundSmart(v)} %` : '-- %';
    }

    function percentToFraction(percent){
      if (!Number.isFinite(percent) || percent <= 0) return 0;
      return 100 / percent;
    }

    function fractionToPercent(denom){
      if (!Number.isFinite(denom) || denom <= 0) return 0;
      return 100 / denom;
    }

    function approximateFraction(percent){
      if (!Number.isFinite(percent) || percent <= 0) return '--';
      const exactDenom = 100 / percent;
      return `1/${exactDenom.toFixed(1).replace(/\.0$/, '')}`;
    }

    function syncPercentInputs(percent){
      if (!Number.isFinite(percent) || percent <= 0) return;
      els.runPercent.value = roundSmart(percent);
      els.risePercent.value = roundSmart(percent);
      els.runFraction.value = roundSmart(percentToFraction(percent));
      els.riseFraction.value = roundSmart(percentToFraction(percent));
    }

    function updateQuickActive(percent){
      els.quickButtons.forEach(btn => {
        const p = Number(btn.dataset.percent);
        btn.classList.toggle('active', Math.abs(p - percent) < 0.0001);
      });
    }

    function getRunPercent(){
      return state.runInputMode === 'percent'
        ? num(els.runPercent.value)
        : fractionToPercent(num(els.runFraction.value));
    }

    function getRisePercent(){
      return state.riseInputMode === 'percent'
        ? num(els.risePercent.value)
        : fractionToPercent(num(els.riseFraction.value));
    }

    function renderInputModes(){
      els.runInputModePercent.classList.toggle('active', state.runInputMode === 'percent');
      els.runInputModeFraction.classList.toggle('active', state.runInputMode === 'fraction');
      els.riseInputModePercent.classList.toggle('active', state.riseInputMode === 'percent');
      els.riseInputModeFraction.classList.toggle('active', state.riseInputMode === 'fraction');
      els.runPercentWrap.classList.toggle('hidden', state.runInputMode !== 'percent');
      els.runFractionWrap.classList.toggle('hidden', state.runInputMode !== 'fraction');
      els.risePercentWrap.classList.toggle('hidden', state.riseInputMode !== 'percent');
      els.riseFractionWrap.classList.toggle('hidden', state.riseInputMode !== 'fraction');
    }

    function setMode(mode){
      state.mode = mode;
      els.modeSlope.classList.toggle('active', mode === 'slope');
      els.modeRun.classList.toggle('active', mode === 'run');
      els.modeRise.classList.toggle('active', mode === 'rise');
      els.panelSlope.classList.toggle('hidden', mode !== 'slope');
      els.panelRun.classList.toggle('hidden', mode !== 'run');
      els.panelRise.classList.toggle('hidden', mode !== 'rise');
      els.resultSlope.classList.toggle('hidden', mode !== 'slope');
      els.resultRunWrap.classList.toggle('hidden', mode !== 'run');
      els.resultRiseWrap.classList.toggle('hidden', mode !== 'rise');
      recalc();
    }

    function recalc(){
      if (state.mode === 'slope'){
        const run = num(els.slopeRun.value);
        const rise = num(els.slopeRise.value);
        if (!Number.isFinite(run) || run <= 0 || !Number.isFinite(rise) || rise < 0){
          els.resultPercent.textContent = '-- %';
          els.resultFraction.textContent = '--';
          return;
        }
        const percent = (rise / run) * 100;
        els.resultPercent.textContent = formatPercent(percent);
        els.resultFraction.textContent = approximateFraction(percent);
        updateQuickActive(percent);
        syncPercentInputs(percent);
        return;
      }

      if (state.mode === 'run'){
        const percent = getRunPercent();
        const rise = num(els.runRise.value);
        if (!Number.isFinite(percent) || percent <= 0 || !Number.isFinite(rise) || rise < 0){
          els.resultRun.textContent = '-- mm';
          return;
        }
        const run = rise / (percent / 100);
        els.resultRun.textContent = formatMm(run);
        updateQuickActive(percent);
        syncPercentInputs(percent);
        return;
      }

      const percent = getRisePercent();
      const run = num(els.riseRun.value);
      if (!Number.isFinite(percent) || percent <= 0 || !Number.isFinite(run) || run < 0){
        els.resultRise.textContent = '-- mm';
        return;
      }
      const rise = run * (percent / 100);
      els.resultRise.textContent = formatMm(rise);
      updateQuickActive(percent);
      syncPercentInputs(percent);
    }

    els.modeSlope.addEventListener('click', () => setMode('slope'));
    els.modeRun.addEventListener('click', () => setMode('run'));
    els.modeRise.addEventListener('click', () => setMode('rise'));

    els.runInputModePercent.addEventListener('click', () => {
      state.runInputMode = 'percent';
      renderInputModes();
      recalc();
    });
    els.runInputModeFraction.addEventListener('click', () => {
      state.runInputMode = 'fraction';
      renderInputModes();
      recalc();
    });
    els.riseInputModePercent.addEventListener('click', () => {
      state.riseInputMode = 'percent';
      renderInputModes();
      recalc();
    });
    els.riseInputModeFraction.addEventListener('click', () => {
      state.riseInputMode = 'fraction';
      renderInputModes();
      recalc();
    });

    [
      els.slopeRun,
      els.slopeRise,
      els.runPercent,
      els.runFraction,
      els.runRise,
      els.risePercent,
      els.riseFraction,
      els.riseRun
    ].forEach(el => {
      el.addEventListener('input', recalc);
    });

    els.quickButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const percent = Number(btn.dataset.percent);
        syncPercentInputs(percent);
        updateQuickActive(percent);
        recalc();
      });
    });

    els.resetBtn.addEventListener('click', () => {
      els.slopeRun.value = '';
      els.slopeRise.value = '';
      els.runPercent.value = '';
      els.runFraction.value = '';
      els.runRise.value = '';
      els.risePercent.value = '';
      els.riseFraction.value = '';
      els.riseRun.value = '';
      els.resultPercent.textContent = '-- %';
      els.resultFraction.textContent = '--';
      els.resultRun.textContent = '-- mm';
      els.resultRise.textContent = '-- mm';
      els.quickButtons.forEach(btn => btn.classList.remove('active'));
      state.runInputMode = 'percent';
      state.riseInputMode = 'percent';
      renderInputModes();
      recalc();
    });

    renderInputModes();
    setMode('slope');
  </script>
</body>
</html>
